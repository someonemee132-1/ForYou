<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💗</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body { font-family:'Lato',sans-serif; background:#0f0f1a; }

/* ===== BACKGROUND ===== */
.bg { position:fixed; inset:0; pointer-events:none; z-index:0; transition:opacity 1.2s ease; }
#bg0 { background:radial-gradient(ellipse at 30% 70%,#1b0a3b,#0a0a1a); }
#bg1 { background:radial-gradient(ellipse at 60% 40%,#0a1a3b,#050d24); opacity:0; }
#bg2 { background:radial-gradient(ellipse at 50% 60%,#1e0020,#08000f); opacity:0; }

/* ===== STARS ===== */
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; background:#fff; border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);
}
@keyframes twinkle {
  0%,100%{ opacity:.1; transform:scale(1); }
  50%    { opacity:1;  transform:scale(1.5); }
}

/* ===== SCREEN PAGES ===== */
.screen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  padding:1.5rem;
  opacity:0; pointer-events:none;
  transition:opacity .7s ease, transform .7s ease;
  transform:translateY(30px);
  z-index:5;
}
.screen.show { opacity:1; pointer-events:all; transform:translateY(0); }
.screen.hide { opacity:0; transform:translateY(-30px); transition:opacity .4s,transform .4s; }

/* ===== SCREEN 0 : HALO ===== */
.s0-pre {
  font-size:.7rem; letter-spacing:5px; text-transform:uppercase;
  color:rgba(255,255,255,.3); margin-bottom:1.4rem;
}
.s0-big {
  font-family:'Dancing Script',cursive;
  font-size:clamp(3rem,11vw,6.5rem);
  color:#fff; line-height:1.1; text-align:center;
}
.s0-name { display:block; color:#ff9eb5; animation:nglow 2.5s ease-in-out infinite; }
@keyframes nglow {
  0%,100%{ text-shadow:0 0 20px rgba(255,158,181,.3); }
  50%    { text-shadow:0 0 55px rgba(255,158,181,.9),0 0 100px rgba(255,80,120,.4); }
}
.s0-sub {
  font-size:.8rem; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,.38); font-weight:300; margin-top:1.2rem;
}
.btn-ghost {
  margin-top:2.8rem; padding:.85rem 2.8rem;
  background:transparent; border:1.5px solid rgba(255,158,181,.6);
  color:#ff9eb5; font-family:'Lato',sans-serif;
  font-size:.78rem; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; cursor:pointer; border-radius:60px;
  transition:background .3s, box-shadow .3s, transform .3s;
  animation:fbtn 3s ease-in-out infinite;
}
.btn-ghost:hover {
  background:rgba(255,158,181,.12);
  box-shadow:0 0 28px rgba(255,100,130,.3);
  animation-play-state:paused; transform:translateY(-3px);
}
@keyframes fbtn { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

/* ===== SCREEN 1 : BUKU TERTUTUP ===== */
.closed-stage {
  position:relative; width:300px; height:400px;
  display:flex; align-items:center; justify-content:center;
}
.cbook {
  position:relative; width:220px; height:300px;
  cursor:pointer;
  filter:drop-shadow(12px 16px 32px rgba(0,0,0,.7));
  transition:transform .35s ease, filter .35s ease;
  animation:bookbob 4s ease-in-out infinite;
}
.cbook:hover {
  transform:scale(1.06) rotate(-2deg);
  filter:drop-shadow(16px 20px 40px rgba(180,0,60,.5));
}
@keyframes bookbob {
  0%,100%{ transform:translateY(0) rotate(-3deg); }
  50%    { transform:translateY(-10px) rotate(-1deg); }
}
.cbook-front {
  position:absolute; inset:0;
  background:linear-gradient(150deg,#7a0040,#3d0020);
  border-radius:5px 14px 14px 5px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.9rem;
  border:2px solid rgba(255,180,200,.2);
  overflow:hidden;
}
.cbook-front::before {
  content:''; position:absolute; inset:10px;
  border:1px solid rgba(255,158,181,.18);
  border-radius:3px 10px 10px 3px; pointer-events:none;
}
.cbook-front::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,transparent 55%);
  pointer-events:none;
}
.cbook-icon  { font-size:3.2rem; }
.cbook-title {
  font-family:'Dancing Script',cursive;
  font-size:1.35rem; color:#ffb3c6; text-align:center;
  padding:0 1rem; line-height:1.35;
}
.cbook-sub {
  font-size:.6rem; letter-spacing:4px; text-transform:uppercase;
  color:rgba(255,180,200,.45);
}
.cbook-spine {
  position:absolute; left:-14px; top:3px;
  width:14px; height:296px;
  background:linear-gradient(90deg,#280012,#5a0030,#280012);
  border-radius:5px 0 0 5px;
  box-shadow:-3px 0 8px rgba(0,0,0,.6);
}
.cbook-edge {
  position:absolute; right:-10px; top:3px;
  width:10px; height:296px;
  background:repeating-linear-gradient(
    90deg, #f8ede8 0px,#ead5cc 1px,#f8ede8 1px,#f8ede8 4px
  );
  border-radius:0 3px 3px 0;
}
.cbook-shadow {
  position:absolute; bottom:-18px; left:50%;
  transform:translateX(-50%);
  width:180px; height:18px;
  background:radial-gradient(ellipse,rgba(0,0,0,.55) 0%,transparent 75%);
}
.hint {
  position:absolute; bottom:-48px; left:50%;
  transform:translateX(-50%); white-space:nowrap;
  font-size:.65rem; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,158,181,.5); animation:phint 2s ease-in-out infinite;
}
@keyframes phint { 0%,100%{opacity:.4} 50%{opacity:1} }
.cbook.opening {
  animation:bookopen .9s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes bookopen {
  0%  { transform:translateY(0) rotate(-3deg) scale(1); opacity:1; }
  40% { transform:translateY(-20px) rotate(5deg) scale(1.08); opacity:1; }
  100%{ transform:translateY(-20px) rotate(5deg) scale(0) ; opacity:0; }
}

/* ===== SCREEN 2 : BUKU TERBUKA ===== */
#s2 { padding:.5rem; }
.book-wrap {
  position:relative;
  width:min(760px, 97vw);
  height:min(460px, 80vh);
  opacity:0; transform:scale(.9) translateY(16px);
  transition:opacity .8s ease, transform .8s ease;
}
.book-wrap.show-book { opacity:1; transform:scale(1) translateY(0); }
.bk-left, .bk-right {
  position:absolute; top:0;
  width:calc(50% - 13px);
  height:100%;
  background:linear-gradient(158deg,#fff9f6,#fff0ea);
  display:flex; flex-direction:column;
  padding:1.6rem 1.5rem 1.2rem;
  overflow:hidden;
}
.bk-left  { left:0;  border-radius:14px 0 0 14px; box-shadow:-4px 4px 20px rgba(0,0,0,.45); }
.bk-right { right:0; border-radius:0 14px 14px 0; box-shadow: 4px 4px 20px rgba(0,0,0,.45); }
.bk-left::after, .bk-right::after {
  content:''; position:absolute; inset:0; top:3.2rem;
  background:repeating-linear-gradient(
    transparent,transparent 31px,rgba(180,130,155,.17) 31px,rgba(180,130,155,.17) 32px
  );
  pointer-events:none;
}
.bk-spine {
  position:absolute; left:50%; top:0;
  transform:translateX(-50%);
  width:26px; height:100%;
  background:linear-gradient(90deg,#3a0018,#6b003a,#3a0018);
  z-index:20; border-radius:3px;
  box-shadow:0 0 16px rgba(0,0,0,.7);
}
.pg-title {
  font-family:'Dancing Script',cursive;
  font-size:clamp(.95rem,2.5vw,1.35rem); color:#7a1a40;
  border-bottom:1px solid rgba(160,80,110,.2);
  padding-bottom:.4rem; margin-bottom:.7rem;
  position:relative; z-index:1;
}
.pg-body {
  font-size:clamp(.65rem,1.6vw,.82rem);
  color:#5a1830; line-height:1.95; font-weight:300;
  flex:1; position:relative; z-index:1;
  white-space:pre-wrap;
}
.pg-num {
  font-size:.6rem; letter-spacing:2px;
  color:rgba(140,70,100,.45); position:relative; z-index:1;
  margin-top:.5rem;
}
.bk-left  .pg-num { text-align:right; }
.bk-right .pg-num { text-align:left; }
.nav-bar {
  display:flex; gap:.5rem; justify-content:flex-end;
  margin-top:.5rem; position:relative; z-index:1;
}
.btn-nav {
  padding:.32rem .95rem;
  background:rgba(122,26,64,.1);
  border:1px solid rgba(122,26,64,.28);
  color:#7a1a40; font-family:'Lato',sans-serif;
  font-size:.6rem; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; border-radius:30px; transition:all .25s;
}
.btn-nav:hover:not(:disabled) { background:rgba(122,26,64,.22); transform:scale(1.05); }
.btn-nav:disabled { opacity:.25; cursor:default; }

/* ===== FLIP LAYER ===== */
.flip-layer {
  position:absolute; top:0;
  height:100%;
  width:calc(50% - 13px);
  background:linear-gradient(158deg,#fff9f6,#fff0ea);
  display:flex; flex-direction:column;
  padding:1.6rem 1.5rem 1.2rem;
  overflow:hidden;
  z-index:30;
  pointer-events:none;
  opacity:0;
}
.flip-layer.right-side { right:0; border-radius:0 14px 14px 0; }
.flip-layer.left-side  { left:0;  border-radius:14px 0 0 14px; }
.flip-layer::after {
  content:''; position:absolute; inset:0; top:3.2rem;
  background:repeating-linear-gradient(
    transparent,transparent 31px,rgba(180,130,155,.17) 31px,rgba(180,130,155,.17) 32px
  );
  pointer-events:none;
}
@keyframes flip-next {
  0%   { transform:translateX(0)     scaleX(1);   opacity:1; }
  45%  { transform:translateX(-30%)  scaleX(.4);  opacity:.7; box-shadow:-8px 0 20px rgba(0,0,0,.3); }
  100% { transform:translateX(-100%) scaleX(0);   opacity:0; }
}
@keyframes flip-prev {
  0%   { transform:translateX(0)    scaleX(1);   opacity:1; }
  45%  { transform:translateX(30%)  scaleX(.4);  opacity:.7; box-shadow:8px 0 20px rgba(0,0,0,.3); }
  100% { transform:translateX(100%) scaleX(0);   opacity:0; }
}
.flip-layer.anim-next { animation:flip-next .75s cubic-bezier(.4,0,.2,1) forwards; }
.flip-layer.anim-prev { animation:flip-prev .75s cubic-bezier(.4,0,.2,1) forwards; }

/* ===== PETALS & HEARTS ===== */
.petal {
  position:fixed; pointer-events:none; z-index:1;
  width:9px; height:13px; border-radius:60% 40% 40% 60%;
  animation:pfalli linear infinite;
}
@keyframes pfalli {
  0%  { transform:translateY(-40px) rotate(0deg);   opacity:.8; }
  100%{ transform:translateY(110vh) rotate(640deg);  opacity:0;  }
}
.hrt {
  position:fixed; pointer-events:none; z-index:1;
  animation:hrise linear forwards; opacity:0;
}
@keyframes hrise {
  0%  { transform:translateY(0) scale(.4); opacity:.9; }
  100%{ transform:translateY(-115vh) scale(1); opacity:0; }
}

/* ===== CURSOR ===== */
.trail {
  position:fixed; width:5px; height:5px; border-radius:50%;
  background:rgba(255,158,181,.7); pointer-events:none; z-index:9000;
  animation:trfl .45s ease forwards;
}
@keyframes trfl { 0%{opacity:.8;transform:scale(1)} 100%{opacity:0;transform:scale(0)} }
.spark {
  position:fixed; font-size:.95rem; pointer-events:none; z-index:9001;
  animation:spfl .75s ease forwards;
}
@keyframes spfl { 0%{opacity:1;transform:scale(1) translateY(0)} 100%{opacity:0;transform:scale(.2) translateY(-18px)} }

/* ===== MUSIC BUTTON ===== */
#musicBtn {
  position:fixed; bottom:1.4rem; right:1.4rem;
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,158,181,.18);
  border:1.5px solid rgba(255,158,181,.5);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:9999;
  backdrop-filter:blur(8px);
  font-size:1.3rem;
  transition:all .3s;
  animation:musicpulse 2.5s ease-in-out infinite;
}
#musicBtn:hover { background:rgba(255,158,181,.3); transform:scale(1.12); animation-play-state:paused; }
@keyframes musicpulse {
  0%,100%{ box-shadow:0 0 0 0 rgba(255,158,181,.5); }
  50%    { box-shadow:0 0 0 10px rgba(255,158,181,0); }
}
#musicBtn.paused { opacity:.45; animation:none; }

/* ===== SCREEN 3 : PENUTUP / BUNGA ===== */
.final-wrap {
  position:relative;
  width:min(380px, 78vw);
  opacity:0;
  transform:scale(.82) translateY(25px);
  transition:opacity 1.3s ease, transform 1.3s ease;
}
.final-wrap.show-final { opacity:1; transform:scale(1) translateY(0); }
.final-img {
  width:100%; display:block;
  border-radius:20px;
  box-shadow:0 0 70px rgba(255,205,150,.4), 0 25px 55px rgba(0,0,0,.65);
}
.final-name {
  position:absolute;
  left:50%; top:67%;
  transform:translate(-50%,-50%);
  font-family:'Dancing Script',cursive;
  font-weight:700;
  font-size:clamp(1.1rem,4.6vw,1.9rem);
  color:#fffaf0;
  text-shadow:0 0 16px rgba(255,210,140,.95), 0 2px 8px rgba(0,0,0,.85);
  white-space:nowrap;
  letter-spacing:.5px;
  opacity:0;
  transition:opacity 1s ease 1.1s;
}
.final-wrap.show-final .final-name { opacity:1; }
@keyframes nameglow {
  0%,100%{ text-shadow:0 0 16px rgba(255,210,140,.95),0 2px 8px rgba(0,0,0,.85); }
  50%    { text-shadow:0 0 30px rgba(255,228,175,1),0 2px 12px rgba(0,0,0,.9); }
}
.final-wrap.show-final .final-name { animation:nameglow 2.6s ease-in-out infinite; }
.final-caption {
  margin-top:1.8rem;
  font-family:'Dancing Script',cursive;
  font-size:clamp(1rem,3.2vw,1.4rem);
  color:rgba(255,225,210,.85);
  text-align:center;
  opacity:0;
  transition:opacity 1s ease 1.6s;
}
#s3.show .final-caption { opacity:1; }
</style>
</head>
<body>

<div class="bg" id="bg0"></div>
<div class="bg" id="bg1"></div>
<div class="bg" id="bg2"></div>
<div id="stars"></div>

<!-- ========== SCREEN 0 : HALO ========== -->
<div class="screen show" id="s0">
  <p class="s0-pre">✦ ada yang ingin aku katakan ✦</p>
  <div class="s0-big">
    Halo,
    <span class="s0-name" id="haloName">Adinda</span>
  </div>
  <p class="s0-sub">ada sesuatu yang ingin aku sampaikan</p>
  <button class="btn-ghost" onclick="gotoS1()">Buka Pesannya ✦</button>
</div>

<!-- ========== SCREEN 1 : BUKU TERTUTUP ========== -->
<div class="screen" id="s1">
  <div class="closed-stage">
    <div class="cbook" id="cbook" onclick="openClosedBook()">
      <div class="cbook-spine"></div>
      <div class="cbook-edge"></div>
      <div class="cbook-front">
        <span class="cbook-icon">💌</span>
        <div class="cbook-title">Sepucuk Surat<br>Dari Hatiku</div>
        <div class="cbook-sub">untuk kamu</div>
      </div>
      <div class="cbook-shadow"></div>
    </div>
    <div class="hint" id="hint">✦ klik buku untuk membuka ✦</div>
  </div>
</div>

<!-- ========== SCREEN 2 : BUKU TERBUKA ========== -->
<div class="screen" id="s2">
  <div class="book-wrap" id="bookWrap">

    <!-- Halaman kiri -->
    <div class="bk-left">
      <div class="pg-title" id="ltitle"></div>
      <div class="pg-body"  id="lbody"></div>
      <div class="nav-bar">
        <button class="btn-nav" id="btnPrev" onclick="prevPage()">‹ Kembali</button>
        <button class="btn-nav" id="btnNext" onclick="nextPage()">Lanjut ›</button>
      </div>
      <div class="pg-num"   id="lnum"></div>
    </div>

    <!-- Punggung tengah -->
    <div class="bk-spine"></div>

    <!-- Halaman kanan -->
    <div class="bk-right">
      <div class="pg-title" id="rtitle"></div>
      <div class="pg-body"  id="rbody"></div>
      <div class="pg-num"   id="rnum"></div>
    </div>

    <!-- Flip layer (overlay animasi balik halaman) -->
    <div class="flip-layer" id="flipLayer">
      <div class="pg-title" id="ftitle"></div>
      <div class="pg-body"  id="fbody"></div>
      <div class="pg-num"   id="fnum"></div>
    </div>

  </div>
</div>

<!-- ========== SCREEN 3 : PENUTUP / BUNGA ========== -->
<div class="screen" id="s3">
  <div class="final-wrap" id="finalWrap">
    <img src="bunga.png" alt="Rangkaian bunga untukmu" class="final-img">
    <div class="final-name" id="finalName"></div>
  </div>
  <p class="final-caption" id="finalCaption"></p>
</div>

<!-- ===== BACKSOUND ===== -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2024/10/18/audio_799aabfeb7.mp3" type="audio/mpeg">
</audio>

<!-- Music control button -->
<div id="musicBtn" onclick="toggleMusic()" title="Play/Pause musik">
  <span id="musicIcon">🎵</span>
</div>

<script>
/* ============================================================
   KONFIGURASI — EDIT DI SINI SAJA
   ============================================================ */
const NAMA     = "Darin";                          // ← nama penerima
const PENGIRIM = "Seseorang yang menyayangimu 🌹"; // ← nama pengirim

const SPREADS = [
  {
    left: {
      title : `Untuk ${NAMA} 🌙`,
      body  :
`Aku memang tidak pandai merangkai kata.
Tapi izinkan aku bercerita —
tentang bagaimana perasaan ini
bisa muncul tanpa pernah aku undang.

Hari itu aku datang ke seminar
kerja praktik teman-temanku,
sekadar mengisi waktu luang.
Aku tidak menyangka,
hari itu akan mengubah segalanya.`,
      num : "1"
    },
    right: {
      title : "Pandangan Pertama ✨",
      body  :
`Di sela kesibukanku mengerjakan laporan,
entah ada angin apa —
mataku seperti dipaksa untuk melirik
ke arah seseorang di depanku.

Orang itu adalah kamu, ${NAMA}.

Aku mencoba mengabaikannya.
Tapi bisikan itu terus datang,
dan setiap kali aku melirik,
ada sesuatu yang terasa berbeda.

Apakah ini yang dinamakan
cinta pandangan pertama?`,
      num : "2"
    }
  },
  {
    left: {
      title : "Algoritma yang Jujur 📱",
      body  :
`Aku pikir perasaan itu akan hilang
begitu aku keluar dari ruangan.
Ternyata tidak.

Malam itu, saat aku membuka sosial media,
wajahmu muncul di layarku.
Lagi, dan lagi, dan lagi.

Seolah algoritma itu tahu
apa yang belum berani aku akui —
bahwa aku menyukaimu.`,
      num : "3"
    },
    right: {
      title : "Masih Sampai Sekarang 💗",
      body  :
`Aku mengikuti akunmu,
menyukai video-videomu —
mungkin sempat membuatmu risih,
dan aku minta maaf untuk itu.

Tapi perasaan ini tidak pergi.
Ia tetap ada, diam-diam,
setiap kali namamu muncul di layarku.

Mungkin segini saja ceritanya.
Yang pasti —

kamu berarti, ${NAMA}.`,
      num : "4"
    }
  },
  {
    left: {
      title : "Harapan yang Hampir Pupus 🥀",
      body  :
`Dan kemudian aku tahu —
kamu sedang menyukai orang lain.

Rasanya seperti membaca cerita
yang sudah aku tahu endingnya,
tapi tetap berharap plotnya berubah.

Aku tidak marah.
Bagaimana bisa aku marah
pada seseorang yang bahkan
belum tahu aku ada?`,
      num : "5"
    },
    right: {
      title : "Tetap, Diam-Diam 🌧️",
      body  :
`Mungkin harapan ini memang
tidak seharusnya ada.
Mungkin aku hanya seseorang
yang salah waktu, salah tempat.

Tapi entah kenapa
perasaan ini tidak mau pergi
meski sudah aku paksa.

Aku hanya ingin kamu tahu —
di suatu sudut yang tidak pernah
kamu lihat, ada seseorang
yang diam-diam mendoakanmu bahagia.

Meski bukan bersamaku.

`,
      num : "6"
    }
  },
  {
    left: {
      title : "Satu Harapan 🌱",
      body  :
`Aku tidak meminta kamu
untuk memilihku sekarang.

Aku hanya meminta satu hal kecil —
beri waktu perasaan ini
untuk membuktikan dirinya.
Karena di balik semua keraguan ini,
di balik harapan yang hampir pupus,
masih ada satu percikan yang bertahan.

Percikan itu bernama kamu, ${NAMA}.

Dan selama ia masih menyala,
aku tidak akan menyerah.`,
      num : "7"
    },
    right: {
      title : "Penutup 🌹",
      body  :
`Terima kasih sudah membaca
sampai halaman ini.

Aku tahu ini bukan cerita
yang mudah untuk diterima.
Tapi setiap kata di sini
ditulis dengan jujur,
tanpa dibuat-buat.

Apapun yang kamu rasakan
setelah membaca ini —
aku menghormatinya.

Yang terpenting,
semoga kamu selalu bahagia.
Itu saja yang aku mau.

Dengan tulus,
— ${PENGIRIM}`,
      num : "8"
    }
  }
];
/* ============================================================ */

/* ── state ── */
let cur       = 0;
let flipping  = false;

/* ── stars ── */
const starsEl = document.getElementById('stars');
for(let i=0;i<170;i++){
  const s  = document.createElement('div');
  s.className = 'star';
  const sz = Math.random()*2.6+.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s`;
  starsEl.appendChild(s);
}

/* ── nama ── */
document.getElementById('haloName').textContent = NAMA;

/* ── cursor trail ── */
document.addEventListener('mousemove', e=>{
  const t = document.createElement('div');
  t.className = 'trail';
  t.style.left = (e.clientX-2.5)+'px';
  t.style.top  = (e.clientY-2.5)+'px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 450);
});
document.addEventListener('click', e=>{
  ['✨','💫','🌸','💕','⭐'].forEach(em=>{
    const s = document.createElement('div');
    s.className='spark'; s.textContent=em;
    s.style.left = (e.clientX + (Math.random()-.5)*50)+'px';
    s.style.top  = (e.clientY + (Math.random()-.5)*50)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 750);
  });
});

/* ── transisi antar screen ── */
function switchScreen(fromId, toId, hideBg, showBg, cb){
  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);
  from.classList.remove('show');
  from.classList.add('hide');
  if(hideBg) document.getElementById(hideBg).style.opacity='0';
  if(showBg) document.getElementById(showBg).style.opacity='1';
  setTimeout(()=>{
    from.classList.remove('hide');
    to.classList.add('show');
    if(cb) cb();
  }, 520);
}

/* ── S0 → S1 ── */
function gotoS1(){
  startMusic();
  switchScreen('s0','s1','bg0','bg1');
}

/* ── Klik buku tertutup → animasi lalu ke S2 ── */
function openClosedBook(){
  const bk = document.getElementById('cbook');
  const ht = document.getElementById('hint');
  if(bk.classList.contains('opening')) return;
  ht.style.opacity = '0';
  bk.classList.add('opening');
  setTimeout(()=>{
    switchScreen('s1','s2','bg1','bg2', ()=>{
      renderSpread(0);
      setTimeout(()=>{
        document.getElementById('bookWrap').classList.add('show-book');
        spawnPetals();
        loopHearts();
      }, 80);
    });
  }, 860);
}

/* ── Selesai → tampilkan layar bunga penutup ── */
function finishBook(){
  if(flipping) return;
  flipping = true;
  document.getElementById('bookWrap').classList.remove('show-book');
  document.getElementById('finalName').textContent = 'made from your name';
  document.getElementById('finalCaption').textContent = `Untukmu, ${NAMA} 🌷`;
  setTimeout(()=>{
    switchScreen('s2','s3', null, null, ()=>{
      document.getElementById('s3').classList.add('show');
      setTimeout(()=>{
        document.getElementById('finalWrap').classList.add('show-final');
      }, 150);
    });
    flipping = false;
  }, 400);
}

/* ── render spread ── */
function renderSpread(idx){
  const sp = SPREADS[idx];
  document.getElementById('ltitle').textContent = sp.left.title;
  document.getElementById('lbody').textContent  = sp.left.body;
  document.getElementById('lnum').textContent   = sp.left.num;
  document.getElementById('rtitle').textContent = sp.right.title;
  document.getElementById('rbody').textContent  = sp.right.body;
  document.getElementById('rnum').textContent   = sp.right.num;
  document.getElementById('btnPrev').disabled   = (idx === 0);
  const btnNext = document.getElementById('btnNext');
  if(idx === SPREADS.length - 1){
    btnNext.textContent = 'Selesai ✓';
  } else {
    btnNext.textContent = 'Lanjut ›';
  }
}

/* ── NEXT ── */
function nextPage(){
  if(flipping) return;
  if(cur >= SPREADS.length-1){
    finishBook();
    return;
  }
  flipping = true;
  const nextSp = SPREADS[cur+1];
  const fl     = document.getElementById('flipLayer');
  const sp = SPREADS[cur];
  document.getElementById('ftitle').textContent = sp.right.title;
  document.getElementById('fbody').textContent  = sp.right.body;
  document.getElementById('fnum').textContent   = sp.right.num;
  fl.classList.remove('left-side','anim-prev');
  fl.classList.add('right-side');
  fl.style.opacity = '1';
  document.getElementById('rtitle').textContent = nextSp.left.title;
  document.getElementById('rbody').textContent  = nextSp.left.body;
  document.getElementById('rnum').textContent   = nextSp.left.num;
  fl.classList.remove('anim-next');
  void fl.offsetWidth;
  fl.classList.add('anim-next');
  setTimeout(()=>{
    fl.style.opacity = '0';
    fl.classList.remove('anim-next','right-side');
    cur++;
    renderSpread(cur);
    flipping = false;
  }, 760);
}

/* ── PREV ── */
function prevPage(){
  if(flipping || cur <= 0) return;
  flipping = true;
  const prevSp = SPREADS[cur-1];
  const fl     = document.getElementById('flipLayer');
  const sp = SPREADS[cur];
  document.getElementById('ftitle').textContent = sp.left.title;
  document.getElementById('fbody').textContent  = sp.left.body;
  document.getElementById('fnum').textContent   = sp.left.num;
  fl.classList.remove('right-side','anim-next');
  fl.classList.add('left-side');
  fl.style.opacity = '1';
  document.getElementById('ltitle').textContent = prevSp.right.title;
  document.getElementById('lbody').textContent  = prevSp.right.body;
  document.getElementById('lnum').textContent   = prevSp.right.num;
  fl.classList.remove('anim-prev');
  void fl.offsetWidth;
  fl.classList.add('anim-prev');
  setTimeout(()=>{
    fl.style.opacity = '0';
    fl.classList.remove('anim-prev','left-side');
    cur--;
    renderSpread(cur);
    flipping = false;
  }, 760);
}

/* ── petals ── */
function spawnPetals(){
  const cols = [
    'rgba(255,110,145,.5)','rgba(255,175,200,.4)',
    'rgba(210,70,115,.45)','rgba(255,195,215,.35)'
  ];
  for(let i=0;i<28;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText =
      `left:${Math.random()*100}%;top:-18px;` +
      `background:${cols[~~(Math.random()*cols.length)]};` +
      `animation-duration:${7+Math.random()*9}s;` +
      `animation-delay:${Math.random()*8}s;` +
      `transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(p);
  }
}

/* ── floating hearts ── */
function loopHearts(){
  const ems = ['💕','💗','💖','💓','💝','🌹','✨','💫','🌸'];
  function drop(){
    const h = document.createElement('div');
    h.className = 'hrt';
    h.textContent = ems[~~(Math.random()*ems.length)];
    h.style.cssText =
      `left:${4+Math.random()*92}%;bottom:-40px;` +
      `font-size:${.9+Math.random()*1.1}rem;` +
      `animation-duration:${5+Math.random()*7}s`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 13000);
  }
  for(let i=0;i<10;i++) setTimeout(drop, i*550);
  setInterval(drop, 1300);
}

/* ══════════════════════════════════════════
   MUSIK BACKSOUND — memutar file MP3 asli
   ══════════════════════════════════════════ */
const bgMusic = document.getElementById('musicBtn') ? document.getElementById('bgMusic') : null;
const musicEl = document.getElementById('bgMusic');
let musicStarted = false;

function startMusic(){
  if(musicStarted) return;
  musicStarted = true;
  musicEl.volume = 0;
  musicEl.play().then(()=>{
    // fade in volume secara halus
    let v = 0;
    const fade = setInterval(()=>{
      v += 0.05;
      musicEl.volume = Math.min(v, 0.8);
      if(v >= 0.8) clearInterval(fade);
    }, 150);
  }).catch(err=>{
    console.warn('Autoplay diblokir browser, klik tombol musik untuk memutar:', err);
  });
  document.getElementById('musicIcon').textContent = '🎵';
}

function toggleMusic(){
  if(!musicStarted){ startMusic(); return; }
  const btn = document.getElementById('musicBtn');
  const icon = document.getElementById('musicIcon');
  if(!musicEl.paused){
    musicEl.pause();
    icon.textContent = '🔇';
    btn.classList.add('paused');
  } else {
    musicEl.play();
    icon.textContent = '🎵';
    btn.classList.remove('paused');
  }
}
</script>
